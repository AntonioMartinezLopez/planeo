# https://taskfile.dev

version: '3'

vars:
  VERSION: '{{.VERSION | default "latest"}}'
  DOCKER_REGISTRY: '{{.DOCKER_REGISTRY | default "ghcr.io/antoniomartinezlopez"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  # ========================================
  # Environment Setup
  # ========================================
  
  setup:
    desc: Install all dependencies and prepare dev environment
    cmds:
      - echo "Installing dependencies..."
      - cd dev && ./install.sh
      - echo "Setting up the dev environment variables..."
      - cp ./dev/.env.template ./dev/.env
      - cp ./services/core/internal/infra/postgres/.envrc.template ./services/core/internal/infra/postgres/.envrc
      - cp ./services/email/internal/infra/postgres/.envrc.template ./services/email/internal/infra/postgres/.envrc
      - cp ./services/core/.env.template ./services/core/.env
      - cp ./services/email/.env.template ./services/email/.env
    sources:
      - dev/install.sh
      - dev/.env.template
      - services/core/internal/infra/postgres/.envrc.template
      - services/email/internal/infra/postgres/.envrc.template
      - services/core/.env.template
      - services/email/.env.template
    generates:
      - dev/.env
      - services/core/internal/infra/postgres/.envrc
      - services/email/internal/infra/postgres/.envrc
      - services/core/.env
      - services/email/.env

  # ========================================
  # Development Environment
  # ========================================

  login:
    desc: Get test tokens for dev environment (admin/planner/user)
    cmds:
      - echo "Login to the dev environment..."
      - cd dev && ./get_test_token.sh

  up:
    desc: Start Docker services and run DB migrations
    cmds:
      - echo "Starting up the dev environment..."
      - cd dev && ./start.sh
      - task: migrate:core
      - task: migrate:email

  down:
    desc: Stop all Docker services and remove volumes
    cmds:
      - echo "Shutting down the dev environment..."
      - cd dev && docker compose down -v

  restart:
    desc: Restart the dev environment
    cmds:
      - task: down
      - task: up

  # ========================================
  # Database Migrations
  # ========================================

  migrate:core:
    desc: Run core service database migrations
    dir: services/core/internal/infra/postgres
    cmds:
      - echo "Running core database migrations..."
      - source .envrc && goose up

  migrate:email:
    desc: Run email service database migrations
    dir: services/email/internal/infra/postgres
    cmds:
      - echo "Running email database migrations..."
      - source .envrc && goose up

  migrate:core:down:
    desc: Rollback core service database migration
    dir: services/core/internal/infra/postgres
    cmds:
      - source .envrc && goose down

  migrate:email:down:
    desc: Rollback email service database migration
    dir: services/email/internal/infra/postgres
    cmds:
      - source .envrc && goose down

  migrate:core:status:
    desc: Show core database migration status
    dir: services/core/internal/infra/postgres
    cmds:
      - source .envrc && goose status

  migrate:email:status:
    desc: Show email database migration status
    dir: services/email/internal/infra/postgres
    cmds:
      - source .envrc && goose status

  # ========================================
  # Infrastructure (OpenTofu)
  # ========================================

  infra:fmt:
    desc: Format all OpenTofu files under infra/
    cmds:
      - tofu fmt -recursive infra/

  infra:init:keycloak:
    desc: Initialize the local Keycloak OpenTofu config
    dir: infra/environments/local/keycloak
    cmds:
      - tofu init

  infra:validate:keycloak:
    desc: Validate the local Keycloak OpenTofu config
    dir: infra/environments/local/keycloak
    cmds:
      - tofu validate

  infra:plan:keycloak:
    desc: Preview changes to the local Keycloak config
    dir: infra/environments/local/keycloak
    cmds:
      - tofu plan {{.CLI_ARGS}}

  infra:apply:keycloak:
    desc: Apply changes to the local Keycloak config
    dir: infra/environments/local/keycloak
    cmds:
      # -parallelism=1 serializes provider API calls: Keycloak's authorization
      # resource-server endpoint races (409 Conflict) when multiple
      # authorization-resource/permission creates hit the same client's
      # resource server concurrently, which happens on every from-scratch
      # apply because keycloak-client-authz creates ~12 resources via
      # for_each. Serializing removes that race at its source.
      - tofu apply -input=false -parallelism=1 {{.CLI_ARGS}}

  infra:sync-test-realm:
    desc: Regenerate services/core's Keycloak integration-test fixture from the live local realm
    cmds:
      - ./dev/sync_test_realm.sh

  # ========================================
  # Service Management
  # ========================================

  run:core:
    desc: Run core service with Air hot-reload
    dir: services/core
    cmds:
      - air -c air.toml

  run:email:
    desc: Run email service with Air hot-reload
    dir: services/email
    cmds:
      - air -c air.toml

  # ========================================
  # Testing
  # ========================================

  test:core:unit:
    desc: Run core service unit tests only
    cmds:
      - echo "Running unit tests for core service..."
      - go test ./services/core/... -v -short -count=1

  test:core:integration:
    desc: Run core service integration tests
    cmds:
      - echo "Running integration tests for core service..."
      - go test ./services/core/... -p 1 -v -count=1

  test:core:all:
    desc: Run all core service tests
    cmds:
      - task: test:core:integration

  test:email:unit:
    desc: Run email service unit tests only
    cmds:
      - echo "Running unit tests for email service..."
      - go test ./services/email/... -v -short -count=1

  test:email:integration:
    desc: Run email service integration tests
    cmds:
      - echo "Running integration tests for email service..."
      - go test ./services/email/... -p 1 -v -count=1

  test:email:all:
    desc: Run all email service tests
    cmds:
      - task: test:email:integration

  test:libs:unit:
    desc: Run shared libs unit tests only
    cmds:
      - echo "Running unit tests for shared libs..."
      - go test ./libs/... -v -short -count=1

  test:libs:integration:
    desc: Run shared libs integration tests
    cmds:
      - echo "Running integration tests for shared libs..."
      - go test ./libs/... -p 1 -v -count=1

  test:libs:all:
    desc: Run all shared libs tests
    cmds:
      - task: test:libs:integration

  test:all:
    desc: Run all tests for all services
    cmds:
      - task: test:core:all
      - task: test:email:all
      - task: test:libs:all

  # ========================================
  # Linting
  # ========================================

  lint:core:
    desc: Run golangci-lint on core service
    dir: services/core
    cmds:
      - echo "Running golangci-lint on core service..."
      - golangci-lint run --config ../../.golangci.yml

  lint:email:
    desc: Run golangci-lint on email service
    dir: services/email
    cmds:
      - echo "Running golangci-lint on email service..."
      - golangci-lint run --config ../../.golangci.yml

  lint:all:
    desc: Run linting on all services
    cmds:
      - task: lint:core
      - task: lint:email

  # ========================================
  # Building
  # ========================================

  build:core:
    desc: Build Docker image for core service
    cmds:
      - echo "Building Docker image for core with tag {{.VERSION}}..."
      - docker build -t {{.DOCKER_REGISTRY}}/core:{{.VERSION}} -f services/core/Dockerfile .

  build:email:
    desc: Build Docker image for email service
    cmds:
      - echo "Building Docker image for email with tag {{.VERSION}}..."
      - docker build -t {{.DOCKER_REGISTRY}}/email:{{.VERSION}} -f services/email/Dockerfile .

  build:email:email-received-producer:
    desc: Build Docker image for email-received-producer sidecar
    cmds:
      - echo "Building Docker image for email-received-producer with tag {{.VERSION}}..."
      - docker build -t {{.DOCKER_REGISTRY}}/email-received-producer:{{.VERSION}} -f services/email/Dockerfile.email-received-producer .

  build:core:email-received-consumer:
    desc: Build Docker image for email-received-consumer sidecar
    cmds:
      - echo "Building Docker image for email-received-consumer with tag {{.VERSION}}..."
      - docker build -t {{.DOCKER_REGISTRY}}/email-received-consumer:{{.VERSION}} -f services/core/Dockerfile.email-received-consumer .

  build:all:
    desc: Build Docker images for all services
    cmds:
      - task: build:core
      - task: build:email
      - task: build:email:email-received-producer
      - task: build:core:email-received-consumer

  # ========================================
  # Frontend
  # ========================================

  web:dev:
    desc: Start frontend development server
    dir: web
    cmds:
      - npm run dev

  web:build:
    desc: Build frontend for production
    dir: web
    cmds:
      - npm run build

  web:generate-client:
    desc: Generate API client from OpenAPI spec
    dir: web
    cmds:
      - npm run generate-client:core

  web:install:
    desc: Install frontend dependencies
    dir: web
    cmds:
      - npm install

  # ========================================
  # Cleanup
  # ========================================

  clean:docker:
    desc: Remove all Docker containers, images, and volumes
    cmds:
      - docker system prune -af --volumes
    prompt: This will remove all Docker containers, images, and volumes. Continue?

  clean:deps:
    desc: Clean Go module cache
    cmds:
      - go clean -modcache

  # ========================================
  # CI/CD Helpers
  # ========================================

  ci:test:
    desc: Run all tests for CI/CD
    cmds:
      - task: test:all

  ci:lint:
    desc: Run all linters for CI/CD
    cmds:
      - task: lint:all

  ci:build:
    desc: Build all services for CI/CD
    cmds:
      - task: build:all
