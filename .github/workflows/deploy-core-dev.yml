name: "Backend Release to Dev"
run-name: "Backend Release to Dev"
on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Reference of the commit to release"
                required: true

env:
  REGISTRY: ghcr.io
  Account: antoniomartinezlopez
  IMAGE_NAME: planeo-core

permissions:
    contents: read
    packages: write
    attestations: write
    id-token: write

jobs:
    test-core:
        uses: ./.github/workflows/core-test.yml
    build-container-image:
        runs-on: ubuntu-latest
        needs: test-core
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Log in to the Container registry
              uses: docker/login-action@c66a8fcb2472d4283042d726b2a061b43b3f49ab
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push Docker image
              id: push
              uses: docker/build-push-action@cb941d0b895b09c17fa011d41c411b33c752cf28
              with:
                context: .
                file: ./services/core/Dockerfile
                push: true
                tags: ${{ env.REGISTRY }}/${{ env.Account }}/${{ env.IMAGE_NAME }}:${{ inputs.ref}}
            
